services:
  postgres:
    image: postgres:16-alpine
    container_name: clinical-trials-postgres
    environment:
      POSTGRES_DB: clinical_trials
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d clinical_trials"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: clinical-trials-backend
    ports:
      - "8081:8081"
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PORT=8081

  flutter-dev:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
      target: dev
    container_name: clinical-trials-eu-flutter-dev
    ports:
      - "8080:8080"
    volumes:
      - ./flutter_app:/app
    stdin_open: true
    tty: true
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: